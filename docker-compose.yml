version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: rfid
      POSTGRES_PASSWORD: rfid123
      POSTGRES_DB: vertiche_rfid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfid -d vertiche_rfid"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://rfid:rfid123@postgres:5432/vertiche_rfid
      PORT: 3000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  pgdata:
